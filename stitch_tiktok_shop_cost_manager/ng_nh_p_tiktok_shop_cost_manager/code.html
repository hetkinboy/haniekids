        body {

            background-color: #f2f4f7; /* surface-container-low */

<body class="flex items-center justify-center min-h-screen p-gutter">
<div class="w-full max-w-[440px] flex flex-col items-center">
<div class="mb-10 text-center">
<div class="inline-flex items-center justify-center w-16 h-16 mb-4 rounded-xl bg-primary shadow-sm">
<span class="material-symbols-outlined text-on-primary text-[32px]">payments</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary tracking-tight">TikTok Shop Cost Manager</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Quản lý chi phí vận hành chuyên nghiệp</p>
</div>
<main class="w-full bg-surface-container-lowest rounded-xl shadow-[0px_2px_8px_rgba(0,0,0,0.06)] p-8">
<form action="#" class="space-y-6" method="POST">
<div>
<label class="block font-label-bold text-label-bold text-on-surface-variant mb-2" for="email">Email cửa hàng</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full h-10 pl-10 pr-4 bg-white border border-outline-variant rounded focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all font-body-md text-body-md text-on-surface outline-none" id="email" name="email" placeholder="username@email.com" required="" type="email"/>
</div>
</div>
<div>
<div class="flex justify-between items-center mb-2">
<label class="block font-label-bold text-label-bold text-on-surface-variant" for="password">Mật khẩu</label>
<a class="font-label-bold text-label-bold text-primary hover:underline transition-all" href="#">Quên mật khẩu?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full h-10 pl-10 pr-10 bg-white border border-outline-variant rounded focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all font-body-md text-body-md text-on-surface outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="flex items-center">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="ml-2 font-body-sm text-body-sm text-on-surface-variant" for="remember">Ghi nhớ đăng nhập</label>
</div>
<button class="w-full h-10 bg-primary text-on-primary font-label-bold text-label-bold rounded-lg shadow-sm hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                    Đăng nhập
                    <span class="material-symbols-outlined text-[18px]">login</span>
</button>
</form>
<div class="mt-8 pt-6 border-t border-outline-variant/30 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Chưa có tài khoản? 
                    <a class="text-primary font-label-bold hover:underline transition-all ml-1" href="#">Đăng ký ngay</a>
</p>
</div>
</main>
<footer class="mt-8 text-center">
<div class="flex items-center justify-center gap-6 mb-4">
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Điều khoản</a>
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Bảo mật</a>
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Trợ giúp</a>
</div>
<p class="font-body-sm text-body-sm text-outline">© 2024 TikTok Shop Cost Manager. All rights reserved.</p>
</footer>
</div>
<div class="fixed bottom-8 right-8 hidden lg:block">
<div class="w-64 overflow-hidden rounded-xl border border-outline-variant/30 shadow-lg bg-surface-container-lowest">

<div class="p-4">
<p class="font-label-bold text-label-bold text-primary mb-1">Tin tức mới</p>
<p class="font-body-sm text-body-sm text-on-surface-variant">Cập nhật tính năng đối soát tự động cho phiên bản 2.0.</p>
</div>
</div>
